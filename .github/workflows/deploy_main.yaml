name: Docker Image CI

on:
  workflow_dispatch:
    inputs:
      TargetServer:
        description: 'Select Server for Deployment'
        required: true
        default: 'warning'
        type: choice
        options:
        - ekko.etonec.com
jobs:

  deploy:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - name: Prepare SSH
        shell: bash
        env:
          SSH_HOST: ${{ inputs.TargetServer }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_KEY_B64: ${{ secrets.SSH_KEY_B64 }}
          SSH_PORT: "22"
        run: |
          set -euo pipefail
          test -n "$SSH_HOST" && echo "SSH host defined"
          test -n "$SSH_USER" && echo "SSH user defined"
          test -n "$SSH_KEY" && echo "SSH key defined"
      - name: connection test
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ inputs.TargetServer }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: echo "SSH connection established"
      - name: check if repository exists on target server
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          DEPLOY_REF_NAME: ${{ github.ref_name }}
        with:
          host: ${{ inputs.TargetServer }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          envs: GITHUB_TOKEN,GITHUB_REPOSITORY,GITHUB_REPO_NAME,GITHUB_SERVER_URL,DEPLOY_REF_NAME
          script: |
            set -euo pipefail
            if [ -d "/development/${GITHUB_REPO_NAME}" ]; then
              echo "Repository already exists on target server"
            else
              echo "Repository does not exist on target server, cloning repository"
              cd /development
              git clone --depth=1 "https://x-access-token:${GITHUB_TOKEN}@${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY}.git" "${GITHUB_REPO_NAME}"
            fi
      - name: Deploy to docker compose
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          DEPLOY_REF_NAME: ${{ github.ref_name }}
        with:
          host: ${{ inputs.TargetServer }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          envs: GITHUB_TOKEN,GITHUB_REPOSITORY,GITHUB_REPO_NAME,GITHUB_SERVER_URL,DEPLOY_REF_NAME
          script: |
            set -euo pipefail
            cd /development/${GITHUB_REPO_NAME}
            echo "Checking out repository $(pwd)"
            test -n "${GITHUB_TOKEN:-}"
            test -n "${GITHUB_REPOSITORY:-}"
            test -n "${GITHUB_REPO_NAME:-}"
            test -n "${GITHUB_SERVER_URL:-}"
            test -n "${DEPLOY_REF_NAME:-}"
            GIT_HOST="${GITHUB_SERVER_URL#https://}"
            GIT_HOST="${GIT_HOST#http://}"
            REPO_URL="https://x-access-token:${GITHUB_TOKEN}@${GIT_HOST}/${GITHUB_REPOSITORY}.git"
            git fetch --depth=1 "$REPO_URL" "+refs/heads/${DEPLOY_REF_NAME}:refs/remotes/origin/${DEPLOY_REF_NAME}"
            git checkout -B "${DEPLOY_REF_NAME}" "origin/${DEPLOY_REF_NAME}"
            cp $HOME/${GITHUB_REPO_NAME}/env/.env.dist ./.env

            docker compose build --pull
            docker compose up -d --wait
            docker image prune -a -f